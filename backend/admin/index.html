<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Андрей Палыч — Админ</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

  <!-- ЭКРАН ЛОГИНА -->
  <div id="screen-login" class="screen active">
    <div class="login-box">
      <div class="login-logo">✂</div>
      <h2>Панель администратора</h2>
      <p class="login-sub">Барбершоп «Андрей Палыч»</p>
      <input id="login-username" class="a-input" type="text" placeholder="Логин">
      <input id="login-password" class="a-input" type="password" placeholder="Пароль">
      <div id="login-error" class="error-msg" style="display:none"></div>
      <button class="a-btn" onclick="doLogin()">Войти</button>
    </div>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН -->
  <div id="screen-main" class="screen">

    <!-- Боковое меню -->
    <aside class="sidebar">
      <div class="sidebar-logo">✂ АП</div>
      <nav>
        <a class="nav-item active" data-page="appointments" onclick="showPage('appointments')">
          📋 Записи
        </a>
        <a class="nav-item" data-page="specialists" onclick="showPage('specialists')">
          👤 Специалисты
        </a>
        <a class="nav-item" data-page="services" onclick="showPage('services')">
          ✂ Услуги
        </a>
        <a class="nav-item" data-page="schedule" onclick="showPage('schedule')">
          📅 Расписание
        </a>
      </nav>
      <button class="logout-btn" onclick="doLogout()">Выйти</button>
    </aside>

    <!-- Контент -->
    <main class="main-content">

      <!-- Записи -->
      <div id="page-appointments" class="page active">
        <div class="page-header">
          <h1>Предстоящие записи</h1>
          <div class="filter-row">
            <select id="filter-specialist" class="a-select" onchange="loadAppointments()">
              <option value="">Все специалисты</option>
            </select>
          </div>
        </div>
        <div id="appointments-list"></div>
      </div>

      <!-- Специалисты -->
      <div id="page-specialists" class="page">
        <div class="page-header">
          <h1>Специалисты</h1>
          <button class="a-btn small" onclick="openSpecialistModal()">+ Добавить</button>
        </div>
        <div id="specialists-list"></div>
      </div>

      <!-- Услуги -->
      <div id="page-services" class="page">
        <div class="page-header">
          <h1>Услуги</h1>
          <button class="a-btn small" onclick="openServiceModal()">+ Добавить</button>
        </div>
        <div id="services-list"></div>
      </div>

      <!-- Расписание -->
      <div id="page-schedule" class="page">
        <div class="page-header">
          <h1>Расписание</h1>
        </div>
        <div class="schedule-select-row">
          <select id="schedule-specialist" class="a-select" onchange="loadSchedule()">
            <option value="">Выберите специалиста</option>
          </select>
        </div>
        <div id="schedule-calendar"></div>
      </div>

    </main>
  </div>

  <!-- МОДАЛКА: специалист -->
  <div id="modal-specialist" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-specialist-title">Специалист</span>
        <button onclick="closeModal('modal-specialist')">✕</button>
      </div>
      <input id="sp-name"  class="a-input" placeholder="Имя">
      <input id="sp-photo" class="a-input" placeholder="Путь к фото (images/...)">
      <input id="sp-desc"  class="a-input" placeholder="Описание">
      <div class="a-label">Расписание (часы работы по дням):</div>
      <div id="sp-schedule-editor"></div>
      <input type="hidden" id="sp-id">
      <button class="a-btn" onclick="saveSpecialist()">Сохранить</button>
    </div>
  </div>

  <!-- МОДАЛКА: услуга -->
  <div id="modal-service" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-service-title">Услуга</span>
        <button onclick="closeModal('modal-service')">✕</button>
      </div>
      <input id="svc-name" class="a-input" placeholder="Название услуги">
      <input type="hidden" id="svc-id">
      <button class="a-btn" onclick="saveService()">Сохранить</button>
    </div>
  </div>

  <!-- МОДАЛКА: связь специалист-услуга -->
  <div id="modal-ss" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <div class="modal-header">
        <span>Настройка услуги для специалиста</span>
        <button onclick="closeModal('modal-ss')">✕</button>
      </div>
      <div id="modal-ss-name" class="a-label"></div>
      <input id="ss-price"    class="a-input" placeholder="Цена (BYN)" type="number">
      <input id="ss-duration" class="a-input" placeholder="Длительность (мин)" type="number">
      <input type="hidden" id="ss-specialist-id">
      <input type="hidden" id="ss-service-id">
      <button class="a-btn" onclick="saveSpecialistService()">Сохранить</button>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
