<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админ‑панель — Andreipalych.by</title>
</head>
<body>
  <h2>Вход в админку</h2>
  <input id="login" placeholder="Логин">
  <input id="password" placeholder="Пароль" type="password">
  <button id="btn">Войти</button>
  <pre id="output"></pre>

<script>
document.getElementById('btn').onclick = async () => {
  const res = await fetch('http://localhost:4000/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('login').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.token) {
    localStorage.token = data.token;
    const r = await fetch('http://localhost:4000/api/admin/appointments', {
      headers: { Authorization: 'Bearer ' + data.token }
    });
    document.getElementById('output').textContent = JSON.stringify(await r.json(), null, 2);
  } else {
    document.getElementById('output').textContent = JSON.stringify(data, null, 2);
  }
};
</script>
</body>
</html>
